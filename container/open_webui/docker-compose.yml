# ai_desktop_server - Projekt - bridge network
#
# open-webui mit ollama = chatgpt
#
services:
  open_webui:
    image: ghcr.io/open-webui/open-webui:ollama
    container_name: open_webui
#    restart: always
#    mem_limit: 1gb
#    cpus: 4
    ports:
      - 28080:8080
    volumes:
      - ./data:/app/backend/data
      - ./ollama:/root/.ollama
    environment:
      - OLLAMA_BASE_URL=http://172.55.0.3:11434
    network_mode: bridge
